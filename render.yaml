services:
  - type: web
    name: pinterest-expired-hunter-api
    env: python
    region: ohio
    buildCommand: "cd backend && pip install -r requirements.txt && playwright install chromium"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
